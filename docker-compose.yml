version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 360-viewer-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /mnt/tu-pool/videos-360:/videos:ro
      - backend-data:/app/data
    environment:
      - VIDEOS_PATH=/videos
      - LIBRARIES_FILE=/app/data/.libraries.json

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: 360-viewer-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-data:
