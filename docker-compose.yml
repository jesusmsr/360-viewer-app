version: '3.8'

services:
  viewer:
    build:
      context: .
      dockerfile: Dockerfile
    image: 360-viewer:latest
    container_name: 360-viewer
    restart: unless-stopped
    ports:
      # ✏️ Puerto configurable via variable de entorno VIEWER_HOST_PORT (default: 8080)
      # Uso: VIEWER_HOST_PORT=9090 docker-compose up
      - "${VIEWER_HOST_PORT:-8080}:8080"
    volumes:
      # ✏️ CAMBIA ESTA RUTA a tu carpeta de videos 360°
      # Ejemplos:
      # Windows: C:/Users/TuUsuario/Videos/360:/videos:ro
      # Linux:   /home/usuario/videos:/videos:ro
      # NAS:     /mnt/nas/videos-360:/videos:ro
      - ./videos:/videos:ro
      - viewer-data:/app/data
    environment:
      - VIDEOS_PATH=/videos
      - LIBRARIES_FILE=/app/data/.libraries.json
      - FLASK_CORS=true
      - STATIC_FOLDER=/app/static

volumes:
  viewer-data:
